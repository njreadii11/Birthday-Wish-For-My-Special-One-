<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memories 💔</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: black;
  font-family: 'Playfair Display', serif;
  color: white;
}

/* 📸 SLIDES */
.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 1.5s ease-in-out;
}

.slide.active {
  opacity: 1;
}

/* 💔 TEXT */
.text {
  position: absolute;
  bottom: 50px;
  width: 100%;
  text-align: center;
  font-size: 28px;
  text-shadow: 0 0 10px black;
}

/* 🎬 END SCREEN */
.end-screen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: black;
}

.end-text {
  font-size: 45px;
  margin-bottom: 20px;
  text-align: center;
  padding: 0 20px;
}

.replay {
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 📸 SLIDES -->
<div class="slide active" style="background-image:url('photo1.jpg')"></div>
<div class="slide" style="background-image:url('photo2.jpg')"></div>
<div class="slide" style="background-image:url('photo3.jpg')"></div>
<div class="slide" style="background-image:url('photo4.jpg')"></div>
<div class="slide" style="background-image:url('photo5.jpg')"></div>
<div class="slide" style="background-image:url('photo6.jpg')"></div>
<div class="slide" style="background-image:url('photo7.jpg')"></div>
<div class="slide" style="background-image:url('photo8.jpg')"></div>
<div class="slide" style="background-image:url('photo9.jpg')"></div>

<div class="text" id="text"></div>

<!-- 🎶 MUSIC -->
<audio id="music" loop preload="auto">
  <source src="thodi-der.mp3" type="audio/mpeg">
</audio>

<script>
let slides = document.querySelectorAll(".slide");
let text = document.getElementById("text");
let music = document.getElementById("music");

let index = 0;

/* 💬 QUOTES */
const quotes = [
  "Some memories stay forever… 💔",
  "Every moment with uh meant everything…",
  "We may be apart… but those days were real…",
  "You were my happiness once…",
  "And maybe… uh always will be…",
  "And even now… I still miss uh so much…",
  "Some stories end… but feelings don't…",
  "You left… but ur memories stayed…",
  "I tried to forget… but my heart remembers uh everyday nd everytime…"
];

text.innerText = quotes[0];

/* 🎵 AUTO PLAY ATTEMPT (REAL FIX) */
function playMusic() {
  music.volume = 0.8;
  music.play().catch(() => {
    // retry after tiny delay (browser unlock trick)
    setTimeout(() => {
      music.play().catch(()=>{});
    }, 500);
  });
}

/* start instantly */
window.addEventListener("load", playMusic);

/* extra aggressive retry */
setTimeout(playMusic, 500);
setTimeout(playMusic, 1500);

/* ⏱ SLIDESHOW */
let interval = setInterval(() => {

  slides[index].classList.remove("active");
  index++;

  if(index >= slides.length){
    clearInterval(interval);
    showEnd();
    return;
  }

  slides[index].classList.add("active");
  text.innerText = quotes[index] || "";

}, 3000);

/* 🎬 END */
function showEnd(){
  setTimeout(() => {
    document.body.innerHTML = `
      <div class="end-screen">
        <div class="end-text">
          Many Many More Happy Returns Of The Day HAPPY BIRTHDAY MY LOVE 🎂<br>
          I hope life gives uh all the happiness uh deserve💖<br>
          I MISS YOU SO MUCH💔<br>
          KHUSH RAHU ABAD RAHU!<br>
          Allah Always Keeps uh HAPPY MY LUV💖
        </div>
        <button class="replay" onclick="location.reload()">Replay</button>
      </div>
    `;
  }, 2000);
}
</script>

</body>
</html>
