<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memories 💔</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: black;
  font-family: 'Playfair Display', serif;
  color: white;
}

/* 📸 SLIDER */
.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 1.5s ease-in-out;
}

.slide.active {
  opacity: 1;
}

/* 💔 TEXT */
.text {
  position: absolute;
  bottom: 50px;
  width: 100%;
  text-align: center;
  font-size: 28px;
  text-shadow: 0 0 10px black;
}

/* 🎬 END SCREEN */
.end-screen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: black;
}

.end-text {
  font-size: 50px;
  margin-bottom: 20px;
}

.replay {
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 📸 SLIDES -->
<div class="slide active" style="background-image:url('photo1.jpg')"></div>
<div class="slide" style="background-image:url('photo2.jpg')"></div>
<div class="slide" style="background-image:url('photo3.jpg')"></div>
<div class="slide" style="background-image:url('photo4.jpg')"></div>
<div class="slide" style="background-image:url('photo5.jpg')"></div>

<!-- 💔 TEXT -->
<div class="text" id="text"></div>

<!-- 🎶 MUSIC -->
<audio id="music" loop>
  <source src="thodi der.mp3" type="audio/mpeg">
</audio>

<script>
let slides = document.querySelectorAll(".slide");
let text = document.getElementById("text");
let music = document.getElementById("music");

let index = 0;

/* 🔊 music fix */
document.body.addEventListener("click", () => {
  music.play().catch(()=>{});
}, { once: true });

const quotes = [
  "Some memories stay forever… 💔",
  "Every moment with you meant everything…",
  "We may be apart… but those days were real…",
  "You were my happiness once…",
  "And maybe… you always will be…"
];

text.innerText = quotes[0];

let interval = setInterval(() => {

  slides[index].classList.remove("active");
  index++;

  /* ❗ FIX: jab last slide finish ho */
  if(index >= slides.length){
    clearInterval(interval);
    showEnd();
    return;
  }

  slides[index].classList.add("active");
  text.innerText = quotes[index] || "";

}, 3000);


/* 🎬 FINAL SCREEN */
function showEnd(){
  setTimeout(() => {
    document.body.innerHTML = `
      <div class="end-screen">
        <div class="end-text">💔</div>
        <button class="replay" onclick="location.href='index.html'">Replay</button>
      </div>
    `;
  }, 2000);
}
</script>

</body>
</html>
