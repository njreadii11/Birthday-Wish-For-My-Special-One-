<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #ff4d6d, #000);
  font-family: Arial;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* ❤️ Heartbeat */
h1 {
  font-size: 60px;
  animation: beat 1s infinite;
}
@keyframes beat {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* ✨ Typing Name */
.typing {
  font-size: 35px;
  border-right: 3px solid white;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  margin: auto;
  animation: typing 4s steps(20,end) forwards, blink 0.7s infinite;
}
@keyframes typing {
  to { width: 300px; }
}
@keyframes blink {
  50% { border-color: transparent; }
}

/* 💌 Message typing */
.message {
  width: 0;
  overflow: hidden;
  white-space: nowrap;
  margin: auto;
  margin-top: 20px;
  animation: typing2 6s steps(60,end) forwards;
}
@keyframes typing2 {
  to { width: 600px; }
}

/* 📸 Slideshow */
.slideshow {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: -1;
}
.slideshow img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  animation: slide 15s infinite;
}
.slideshow img:nth-child(1){animation-delay:0s;}
.slideshow img:nth-child(2){animation-delay:5s;}
.slideshow img:nth-child(3){animation-delay:10s;}

@keyframes slide {
  0%{opacity:0;}
  10%{opacity:1;}
  30%{opacity:1;}
  40%{opacity:0;}
  100%{opacity:0;}
}

/* 🎈 Balloons */
.balloon {
  position: absolute;
  bottom: -150px;
  width: 60px;
  height: 80px;
  border-radius: 50%;
  animation: float 10s linear infinite;
}
.balloon::after {
  content:"";
  width:2px;
  height:50px;
  background:white;
  position:absolute;
  top:80px;
  left:50%;
}
@keyframes float {
  to { transform: translateY(-120vh); }
}

/* 🎊 Confetti */
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  top: -10px;
  animation: fall 5s linear infinite;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); }
}

.container {
  position: relative;
  top: 20%;
}
</style>

</head>

<body>

<!-- 📸 Background Slideshow -->
<div class="slideshow">
  <img src="photo1.jpg">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
</div>

<div class="container">
  <h1>🎉 HAPPY BIRTHDAY ❤️</h1>

  <div class="typing">Khusheadii 💖</div>

  <div class="message">
    You are still the most beautiful part of my life... 💖
  </div>
</div>

<!-- 🎶 Music -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// 🎈 Balloons
for(let i=0;i<12;i++){
 let b=document.createElement("div");
 b.className="balloon";
 b.style.left=Math.random()*100+"vw";
 b.style.background=["red","pink","yellow","blue"][Math.floor(Math.random()*4)];
 b.style.animationDuration=(6+Math.random()*5)+"s";
 document.body.appendChild(b);
}

// 🎊 Confetti
for(let i=0;i<70;i++){
 let c=document.createElement("div");
 c.className="confetti";
 c.style.left=Math.random()*100+"vw";
 c.style.background=["red","yellow","blue","pink","white"][Math.floor(Math.random()*5)];
 c.style.animationDuration=(3+Math.random()*3)+"s";
 document.body.appendChild(c);
}
</script>

</body>
</html>
