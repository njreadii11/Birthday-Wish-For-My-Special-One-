<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday 🎉</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff4d6d, #ff99ac);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 80px;
      color: white;
      text-shadow: 0 0 20px rgba(0,0,0,0.3);
      animation: zoom 2s ease-in-out infinite alternate;
    }

    @keyframes zoom {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }
  </style>

</head>
<body>

  <h1>🎉 HAPPY BIRTHDAY 🎂</h1>

</body>
</html>
