<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Private ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  font-family: Arial;
  overflow: hidden;
}

/* ❤️ BG */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("https://i.imgur.com/9bK0K7C.png");
  animation: move 20s linear infinite;
  opacity: 0.3;
}

@keyframes move {
  from { background-position: 0 0; }
  to { background-position: 0 1000px; }
}

/* BOX */
.box {
  position: relative;
  z-index: 2;
  background: rgba(0,0,0,0.6);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
}

h2 {
  color: #00ff88;
}

/* INPUT */
input {
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* BUTTONS */
.buttons {
  display: flex;
  justify-content: space-between;
  width: 220px;
  margin-top: 15px;
}

button {
  width: 45%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.cancel { background:#222; color:#ccc; }
.ok { background:#00ff88; }
</style>
</head>

<body>

<div class="box">
<h2>Enter Password 💚</h2>

<input type="password" id="password"><br>

<div class="buttons">
<button class="cancel" onclick="history.back()">Cancel</button>
<button class="ok" onclick="checkPassword()">OK</button>
</div>
</div>

<script>
function checkPassword(){
  let input = document.getElementById("password").value;

  if(input === "khusheadii"){
    window.location.href = "birthday.html";
  } else {
    alert("Wrong Password ❌");
  }
}
</script>

</body>
</html>
