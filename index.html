<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Private 🔐</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;

      /* ❤️ Romantic Background */
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
                  url("https://i.imgur.com/8Km9tLL.jpg") no-repeat center/cover;
      color: white;
    }

    .box {
      background: rgba(0,0,0,0.7);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 25px rgba(255,0,80,0.6);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      width: 250px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
      text-align: center;
    }

    .buttons {
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #ff1f4d;
    }
  </style>

</head>

<body>

  <div class="box">
    <h2>🔐 Enter Password</h2>

    <input type="password" id="password" placeholder="Enter password">

    <div class="buttons">
      <button onclick="checkPassword()">OK</button>
      <button onclick="goBack()">Cancel</button>
    </div>
  </div>

  <script>
    function checkPassword() {
      const correctPassword = "khusheadii"; // ✅ PASSWORD SET
      const input = document.getElementById("password").value;

      if (input === correctPassword) {
        window.location.href = "birthday.html";
      } else {
        alert("Wrong Password ❌");
      }
    }

    function goBack() {
      window.history.back(); // 🔙 back
    }
  </script>

</body>
</html>
