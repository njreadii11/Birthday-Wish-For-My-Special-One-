<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Private Page 🔐</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff4d6d, #1a1a1a);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
    }

    .box {
      text-align: center;
      background: rgba(0,0,0,0.6);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #ff4d6d;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #ff1f4d;
    }
  </style>

</head>

<body>

  <div class="box">
    <h2>🔐 Private Birthday Page</h2>
    <p>Click below to enter</p>
    <button onclick="askPassword()">Enter</button>
  </div>

  <script>
    function askPassword() {
      const correctPassword = "khusheadii"; // ✅ PASSWORD SET

      let userInput = prompt("Enter Password 🔐");

      if (userInput === null) {
        // Cancel button click
        window.history.back();
      } 
      else if (userInput === correctPassword) {
        window.location.href = "birthday.html";
      } 
      else {
        alert("Wrong Password ❌");
      }
    }
  </script>

</body>
</html>
