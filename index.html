<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Private❤️</title>

<style>

/* 🖤 BODY */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  overflow: hidden;
  background: black;
}

/* 🎬 BACKGROUND PATTERN */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("https://i.imgur.com/9bK0K7C.png");
  animation: move 20s linear infinite;
  opacity: 0.15;
}

@keyframes move {
  from { background-position: 0 0; }
  to { background-position: 0 1000px; }
}

/* 💎 GLASS BOX (MATCH MEMORIES) */
.box {
  position: relative;
  z-index: 1;

  /* 🔥 SAME STYLE AS MEMORIES */
  background: rgba(255, 77, 109, 0.15);
  backdrop-filter: blur(20px);

  padding: 50px;
  border-radius: 30px;
  text-align: center;

  box-shadow: 0 0 40px rgba(255,77,109,0.5);
}

/* 💖TITLE */
h2 {
  margin-bottom: 25px;
  color: #ff4d6d;
  font-size: 32px;
}

/* 🔑 INPUT */
input {
  padding: 14px;
  width: 280px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 16px;
  text-align: center;
}

/* 🔘 BUTTON CONTAINER */
.buttons {
  margin-top: 25px;
  display: flex;
  justify-content: space-between;
  width: 280px;
}

/* 🔘 COMMON */
button {
  width: 45%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

/* ❌ CANCEL (LEFT) */
.cancel {
  background: #222;
  color: #ccc;
}

.cancel:hover {
  background: #444;
  transform: scale(1.1);
}

/* ✅ OK (RIGHT - MATCH THEME) */
.ok {
  background: linear-gradient(45deg, #ff4d6d, #ff1f4d);
  color: white;
  box-shadow: 0 0 15px #ff4d6d;
}

.ok:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px #ff4d6d;
}

</style>
</head>

<body>

<div class="box">
  <h2>Enter Password💖</h2>

  <input type="password" id="password" placeholder="Enter password">

  <div class="buttons">
    <button class="cancel" onclick="goBack()">Cancel</button>
    <button class="ok" onclick="checkPassword()">OK</button>
  </div>
</div>

<script>
function checkPassword() {
  const correctPassword = "khusheadii";
  const input = document.getElementById("password").value;

  if (input === correctPassword) {
    window.location.href = "birthday.html";
  } else {
    alert("Wrong Password❌");
  }
}

function goBack() {
  window.history.back();
}
</script>

</body>
</html>
