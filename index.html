<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Private Page ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: black;
  overflow: hidden;
}

/* 💔 BACKGROUND TEXT */
body::before {
  content: "u r my incomplete wish 💔";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 50px;
  color: rgba(255,255,255,0.08);
  text-align: center;
  letter-spacing: 3px;
}

/* 💖 BOX */
.box {
  position: relative;
  z-index: 2;
  background: rgba(255, 0, 80, 0.2);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
}

/* 🔐 INPUT */
input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  margin-top: 10px;
  width: 200px;
}

/* 🔘 BUTTONS */
button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="box">
  <h2>Enter Password ❤️</h2>
  <input type="password" id="password">
  <br>
  <button onclick="checkPassword()">OK</button>
  <button onclick="goBack()">Cancel</button>
</div>

<script>
function checkPassword(){
  if(document.getElementById("password").value === "khusheadii"){
    window.location.href="birthday.html";
  } else {
    alert("Wrong Password ❌");
  }
}

function goBack(){
  window.history.back();
}
</script>

</body>
</html>
