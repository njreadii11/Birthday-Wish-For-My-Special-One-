<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memories 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Raleway:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  font-family: 'Raleway', sans-serif;
  color: white;
}

/* 🎬 VIDEO */
video {
  position: fixed;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%);
  object-fit: cover;
  z-index: -1;
  filter: brightness(60%) blur(2px);
}

/* 💖 OVERLAY */
.overlay {
  position: relative;
  z-index: 2;
  width: 100%;
  min-height: 100vh;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

/* 💬 TEXT */
.text {
  max-width: 850px;
  padding: 20px;
}

/* ✨ LINE */
.line {
  font-size: 24px;
  font-family: 'Playfair Display', serif;
  margin: 14px 0;
  line-height: 1.6;
}

/* 🎬 WORD ANIMATION */
.word {
  opacity: 0;
  display: inline-block;
  transform: translateY(10px);
  animation: fadeWord 0.6s forwards;
  margin-right: 5px;
}

@keyframes fadeWord {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 💔 FINAL TEXT */
.typing {
  font-size: 30px;
  margin-top: 30px;
  border-right: 2px solid white;
}

/* 🔘 NEXT BUTTON */
.next-fixed {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  font-size: 16px;
  z-index: 999;
  box-shadow: 0 0 15px #ff4d6d;
}

.next-fixed:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<!-- 🎬 VIDEO -->
<video id="video" autoplay loop playsinline muted>
  <source src="video.mp4" type="video/mp4">
</video>

<!-- 🎶 AUDIO -->
<audio id="music" loop>
  <source src="sad.mp3" type="audio/mpeg">
</audio>

<!-- 💖 TEXT -->
<div class="overlay">
  <div class="text" id="text"></div>
</div>

<!-- 👉 NEXT BUTTON (ALWAYS VISIBLE) -->
<button class="next-fixed" onclick="goNext()">Next ➝</button>

<script>

// 🔊 CLICK = START VIDEO + AUDIO (IMPORTANT FIX)
let started = false;

function startMedia(){
  if(!started){
    let v = document.getElementById("video");
    let m = document.getElementById("music");

    v.muted = false;
    v.play().catch(()=>{});

    m.play().catch(()=>{});

    started = true;
  }
}

document.body.addEventListener("click", startMedia);


// 💌 TEXT LINES
const lines = [
"I still remember everything… like it just happened yesterday💔",
"We didn’t just end… we slowly faded away",
"I miss the version of uh that loved me",
"We had something real… but not strong enough to last",
"I still go back to our chats… just to feel something",
"You promised forever… I believed uh",
"We stopped talking… but I never stopped caring",
"I lost you… nd somehow, I lost myself too",
"You moved on like I was nothing… I’m still stuck on us",
"I wish I could forget you… but you’re everywhere",
"You were my peace… now you’re my silence",
"I’m surrounded by people… but I still feel alone",
"Some people don’t leave… they stay in ur mind forever",
"I learned how to smile… while breaking inside",
"I gave uh all of me… uh gave me memories",
"I wish we had one more chance… just one",
"I never stopped loving you…💔"
];

let i = 0;

function showLine(){
  if(i < lines.length){

    let lineDiv = document.createElement("div");
    lineDiv.className = "line";
    document.getElementById("text").appendChild(lineDiv);

    let words = lines[i].split(" ");
    let w = 0;

    function showWord(){
      if(w < words.length){
        let span = document.createElement("span");
        span.className = "word";
        span.innerText = words[w] + " ";
        lineDiv.appendChild(span);
        w++;
        setTimeout(showWord, 120);
      } else {
        i++;
        setTimeout(showLine, 700);
      }
    }

    showWord();

  } else {
    showFinalTyping();
  }
}

showLine();

/* 💔 FINAL LINE */
function showFinalTyping(){
  let div = document.createElement("div");
  div.className = "typing";
  document.getElementById("text").appendChild(div);

  let text = "You broke me so quietly… no one noticed💔\n You deserve all the happiness May Allah give uh all the luv you deserve🤲";
  let j = 0;

  function type(){
    if(j < text.length){
      div.innerHTML += text[j];
      j++;
      setTimeout(type, 90);
    }
  }

  type();
}

/* 👉 NEXT PAGE */
function goNext(){
  window.location.href = "page5.html";
}

</script>

</body>
</html>
