<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memories 💖</title>

<!-- 🔥 Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  color: white;
}

/* 🎬 VIDEO FULL SCREEN FIX */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: -1;

  filter: blur(4px);
  animation: zoom 20s infinite alternate ease-in-out;
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.15); }
}

/* 💖 OVERLAY */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* 💌 TEXT BOX */
.text {
  max-width: 900px;
  padding: 20px;
}

/* ✨ LINE STYLE (ATTRACTIVE) */
.line {
  opacity: 0;
  transform: translateY(20px);
  margin: 12px 0;
  font-size: 26px;

  /* 💖 Stylish font */
  font-family: 'Great Vibes', cursive;

  /* 🔥 Glow effect */
  color: #fff;
  text-shadow: 0 0 10px #ff4d6d,
               0 0 20px #ff4d6d,
               0 0 30px #ff1f4d;

  animation: fade 1.2s ease forwards;
}

@keyframes fade {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 💔 FINAL TYPING */
.typing {
  font-size: 32px;
  margin-top: 30px;
  font-family: 'Great Vibes', cursive;
  color: #ff4d6d;
  text-shadow: 0 0 10px #ff4d6d;

  border-right: 3px solid white;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
}
</style>
</head>

<body>

<!-- 🎬 VIDEO -->
<video id="video" loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay">
  <div class="text" id="text"></div>
</div>

<script>
// 🔊 SOUND + PLAY FIX (CLICK REQUIRED)
document.body.addEventListener("click", function(){
  let v = document.getElementById("video");
  v.muted = false;
  v.play();
});

// 💌 TEXT LINES
const lines = [
"Some memories are not meant to fade away…💖",
"They stay quietly in the heart, no matter how far we go.",
"We may not talk anymore, we may not be together…",
"but those moments we shared were real, and they meant everything.",
"Every smile, every laugh, every little fight…",
"they are still alive somewhere inside me.",
"I don’t regret loving you… not even for a second.",
"Because for a moment, you were my whole world.",
"And even today, when I think about those days…",
"I don’t feel pain… I feel something beautiful.",
"Because not all love stories are meant to stay forever…",
"some are just meant to be remembered.💔"
];

let i = 0;

function showLine(){
  if(i < lines.length){
    let div = document.createElement("div");
    div.className = "line";
    div.innerText = lines[i];
    document.getElementById("text").appendChild(div);
    i++;
    setTimeout(showLine, 2500);
  } else {
    showFinalTyping();
  }
}

showLine();

// 💔 FINAL TYPING
function showFinalTyping(){
  let div = document.createElement("div");
  div.className = "typing";
  document.getElementById("text").appendChild(div);

  let text = "I still miss you my luv…💔";
  let j = 0;

  function type(){
    if(j < text.length){
      div.innerHTML += text.charAt(j);
      j++;
      setTimeout(type, 120);
    }
  }
  type();
}
</script>

</body>
</html>
