<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memories💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Raleway:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  font-family: 'Raleway', sans-serif;
  color: white;
}

/* 🎬 VIDEO (NO SOUND EVER) */
video {
  position: fixed;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%);
  object-fit: cover;
  z-index: -1;
  filter: brightness(60%) blur(2px);
}

/* 💖 OVERLAY */
.overlay {
  position: relative;
  z-index: 2;
  width: 100%;
  min-height: 100vh;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

/* 💬 TEXT */
.text {
  max-width: 850px;
  padding: 20px;
}

/* ✨ LINE */
.line {
  font-size: 24px;
  font-family: 'Playfair Display', serif;
  margin: 14px 0;
  line-height: 1.6;
  opacity: 1;
}

/* 🔘 NEXT BUTTON */
.next-fixed {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  font-size: 16px;
  z-index: 999;
  box-shadow: 0 0 15px #ff4d6d;
}
</style>
</head>

<body>

<!-- 🎬 VIDEO (MUTED ALWAYS) -->
<video id="video" autoplay loop playsinline muted>
  <source src="video.mp4" type="video/mp4">
</video>

<!-- 🎶 ONLY ONE SONG -->
<audio id="music" loop preload="auto">
  <source src="chavan-sohneya.mp3" type="audio/mpeg">
</audio>

<!-- 💖 TEXT -->
<div class="overlay">
  <div class="text" id="text"></div>
</div>

<!-- 👉 NEXT -->
<button class="next-fixed" onclick="goNext()">Next ➝</button>

<script>

let started = false;

/* 🔊 FORCE START MUSIC ONLY */
function startAudioOnly(){
  if(!started){
    let music = document.getElementById("music");

    music.pause();
    music.currentTime = 0;
    music.volume = 0.9;

    let playPromise = music.play();

    if(playPromise !== undefined){
      playPromise.catch(() => {
        setTimeout(() => {
          music.play().catch(()=>{});
        }, 500);
      });
    }

    started = true;
  }
}

/* AUTO TRY */
window.addEventListener("load", startAudioOnly);
setTimeout(startAudioOnly, 500);
setTimeout(startAudioOnly, 1500);

/* 💌 TEXT */
const lines = [
const lines = [
"I still remember everything… like it just happened yesterday💔",
"I miss the version of uh that loved me",
"We had something real… but not strong enough to last",
"I still go back to our chats… just to feel something",
"You promised forever… I believed uh",
"We stopped talking… but I never stopped caring",
"I lost uh… and somehow, I lost myself too",
"You moved on like I was nothing… I’m still stuck on us",
"You were my peace… now you’re my silence",
"I smiled in front of everyone… but cried when I was alone",
"I gave uh my everything… uh gave me memories",
"Even now, I still look for uh in random places",
"I pretend I’m okay… but deep down I’m not",
"I loved uh more than I ever knew how to explain",
"You stay in my heart… even when u’re not in my life anymore",
"You were my favorite chapter… even if the story didn’t continue",
"I still find myself hoping you’re doing okay… even from a distance",
"I never stopped loving you",
"I really miss you so much…💔"
];
];

/* SHOW TEXT */
let container = document.getElementById("text");

lines.forEach(t => {
  let div = document.createElement("div");
  div.className = "line";
  div.innerText = t;
  container.appendChild(div);
});

/* 👉 NEXT */
function goNext(){
  window.location.href = "page5.html";
}

</script>

</body>
</html>
