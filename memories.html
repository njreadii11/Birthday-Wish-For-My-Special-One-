<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memories 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Raleway:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Raleway', sans-serif;
  color: white;
}

/* 🎬 VIDEO */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(60%) blur(2px);
}

/* 💖 OVERLAY */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.text {
  max-width: 800px;
  padding: 20px;
}

/* ✨ LINE STYLE */
.line {
  font-size: 24px;
  font-family: 'Playfair Display', serif;
  color: #f5f5f5;
  letter-spacing: 1px;
  margin: 14px 0;
  line-height: 1.6;
}

/* word animation */
.word {
  opacity: 0;
  display: inline-block;
  transform: translateY(10px);
  animation: fadeWord 0.6s forwards;
  margin-right: 5px;
}

@keyframes fadeWord {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 💔 FINAL TYPING */
.typing {
  font-size: 28px;
  margin-top: 30px;
  font-family: 'Playfair Display', serif;
  color: #ffffff;
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
}
</style>
</head>

<body>

<video id="video" autoplay loop playsinline preload="auto">
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay">
  <div class="text" id="text"></div>
</div>

<script>

// 🔊 autoplay fix
document.body.addEventListener("click", function(){
  let v = document.getElementById("video");
  v.muted = false;
  v.play();
});

window.onload = function(){
  document.getElementById("video").play().catch(()=>{});
};

// 💌 TEXT
const lines = [
"Some memories are not meant to fade away… 💖",
"They stay quietly in the heart, no matter how far we go.",
"We may not talk anymore, we may not be together…",
"but those moments we shared were real, and they meant everything.",
"Every smile, every laugh, every little fight…",
"they are still alive somewhere inside me.",
"I don’t regret loving you… not even for a second.",
"Because for a moment, you were my whole world.",
"And even today, when I think about those days…",
"I don’t feel pain… I feel something beautiful.",
"Because not all love stories are meant to stay forever…",
"some are just meant to be remembered. 💔"
];

let i = 0;

function showLine(){
  if(i < lines.length){
    let lineDiv = document.createElement("div");
    lineDiv.className = "line";
    document.getElementById("text").appendChild(lineDiv);

    let words = lines[i].split(" ");
    let w = 0;

    function showWord(){
      if(w < words.length){
        let span = document.createElement("span");
        span.className = "word";
        span.innerText = words[w] + " ";
        lineDiv.appendChild(span);
        w++;
        setTimeout(showWord, 180); // speed control
      } else {
        i++;
        setTimeout(showLine, 800);
      }
    }

    showWord();
  } else {
    showFinalTyping();
  }
}

showLine();

// 💔 FINAL TYPING
function showFinalTyping(){
  let div = document.createElement("div");
  div.className = "typing";
  document.getElementById("text").appendChild(div);

  let text = "I still miss you…";
  let j = 0;

  function type(){
    if(j < text.length){
      div.innerHTML += text.charAt(j);
      j++;
      setTimeout(type, 120);
    }
  }
  type();
}

</script>

</body>
</html>
