<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memories 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Raleway:wght@300&display=swap" rel="stylesheet">

<style>

/* 🖤 BODY */
body {
  margin: 0;
  font-family: 'Raleway', sans-serif;
  color: white;

  overflow-x: hidden;
  overflow-y: auto;
}

/* 🎬 FULL SCREEN VIDEO */
video {
  position: fixed;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%);
  object-fit: cover;
  z-index: -1;
  filter: brightness(60%) blur(3px);
}

/* 💖 OVERLAY */
.overlay {
  position: relative;
  z-index: 2;
  width: 100%;
  min-height: 100vh;

  background: rgba(0,0,0,0.6);

  display: flex;
  justify-content: center;
  align-items: center;

  text-align: center;
  padding: 30px;
}

/* 💌 TEXT BOX */
#text {
  max-width: 850px;
  font-size: 24px;
  line-height: 1.8;
  color: #f5f5f5;

  max-height: 80vh;
  overflow-y: auto;
}

/* ✨ LINE */
.line {
  margin: 15px 0;
  font-family: 'Playfair Display', serif;
}

/* 🎬 WORD ANIMATION */
.word {
  opacity: 0;
  display: inline-block;
  transform: translateY(10px);
  animation: fadeWord 0.6s forwards;
  margin-right: 5px;
}

@keyframes fadeWord {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 💔 FINAL TEXT */
.typing {
  font-size: 30px;
  margin-top: 30px;
  border-right: 2px solid white;
  white-space: normal;
}

/* 🔘 NEXT BUTTON */
.next-btn {
  display: block;
  margin: 50px auto;
  padding: 14px 30px;

  border: none;
  border-radius: 30px;

  background: linear-gradient(45deg, #ff4d6d, #ff1f4d);
  color: white;

  font-size: 18px;
  cursor: pointer;

  box-shadow: 0 0 15px #ff4d6d;
  transition: 0.3s;
}

.next-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px #ff4d6d;
}

</style>
</head>

<body>

<!-- 🎬 VIDEO -->
<video id="video" autoplay loop playsinline muted>
  <source src="video.mp4" type="video/mp4">
</video>

<!-- 💖 TEXT -->
<div class="overlay">
  <div id="text"></div>
</div>

<script>

// 🔊 CLICK TO ENABLE SOUND
document.body.addEventListener("click", function(){
  let v = document.getElementById("video");
  v.muted = false;
  v.play().catch(()=>{});
}, { once: true });

// 💌 TEXT
const lines = [
"Some memories are not meant to fade away… 💖",
"They stay quietly in the heart no matter how far we go.",
"We may not talk anymore we may not be together…",
"but those moments we shared were real and they meant everything.",
"Every smile, every laugh, every little fight…",
"they are still alive somewhere inside me.",
"I don’t regret loving you… not even for a second.",
"Because for a moment, you were my whole world.",
"And even today, when I think about those days…",
"Not all love stories are meant to stay forever…",
"some are just meant to be remembered. 💔"
];

let i = 0;

function showLine(){
  if(i < lines.length){

    let lineDiv = document.createElement("div");
    lineDiv.className = "line";
    document.getElementById("text").appendChild(lineDiv);

    let words = lines[i].split(" ");
    let w = 0;

    function showWord(){
      if(w < words.length){
        let span = document.createElement("span");
        span.className = "word";
        span.innerText = words[w] + " ";
        lineDiv.appendChild(span);
        w++;
        setTimeout(showWord, 120);
      } else {
        i++;
        setTimeout(showLine, 600);
      }
    }

    showWord();

  } else {
    showFinalTyping();
  }
}

showLine();

// 💔 FINAL TEXT + BUTTON
function showFinalTyping(){
  let container = document.getElementById("text");

  let div = document.createElement("div");
  div.className = "typing";
  container.appendChild(div);

  let text = "I still miss you…";
  let j = 0;

  function type(){
    if(j < text.length){
      div.innerHTML += text[j];
      j++;
      setTimeout(type, 80);
    } else {
      showNextButton();
    }
  }

  type();
}

// 👉 NEXT BUTTON
function showNextButton(){
  let btn = document.createElement("button");
  btn.className = "next-btn";
  btn.innerText = "Next ➝";

  btn.onclick = function(){
    window.location.href = "page5.html";
  };

  document.getElementById("text").appendChild(btn);

  btn.scrollIntoView({ behavior: "smooth" });
}

// 🔥 FAILSAFE
setTimeout(showNextButton, 12000);

</script>

</body>
</html>
