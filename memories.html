<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memories 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Raleway:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  font-family: 'Raleway', sans-serif;
  color: white;
}

/* 🎬 VIDEO */
video {
  position: fixed;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%);
  object-fit: cover;
  z-index: -1;
  filter: brightness(60%) blur(2px);
}

/* 💖 OVERLAY */
.overlay {
  position: relative;
  z-index: 2;
  width: 100%;
  min-height: 100vh;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

/* 💬 TEXT BOX */
.text {
  max-width: 850px;
  padding: 20px;
}

/* ✨ LINE */
.line {
  font-size: 24px;
  font-family: 'Playfair Display', serif;
  margin: 14px 0;
  line-height: 1.6;
}

/* 🎬 WORD ANIMATION */
.word {
  opacity: 0;
  display: inline-block;
  transform: translateY(10px);
  animation: fadeWord 0.6s forwards;
  margin-right: 5px;
}

@keyframes fadeWord {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 💔 FINAL */
.typing {
  font-size: 30px;
  margin-top: 30px;
  border-right: 2px solid white;
}

/* 🔘 FIXED NEXT BUTTON */
.next-fixed {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  font-size: 16px;
  z-index: 999;
  box-shadow: 0 0 15px #ff4d6d;
}

.next-fixed:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<!-- 🎬 VIDEO -->
<video id="video" autoplay loop playsinline muted>
  <source src="video.mp4" type="video/mp4">
</video>

<!-- 💖 TEXT -->
<div class="overlay">
  <div class="text" id="text"></div>
</div>

<!-- ✅ NEXT BUTTON (ALWAYS VISIBLE) -->
<button class="next-fixed" onclick="goNext()">Next ➝</button>

<script>

// 🔊 click to unmute
document.body.addEventListener("click", function(){
  let v = document.getElementById("video");
  v.muted = false;
  v.play();
});

// 💌 TEXT
const lines = [
"Some memories are not meant to fade away… 💖",
"They stay quietly in the heart, no matter how far we go.",
"We may not talk anymore, we may not be together…",
"but those moments we shared were real, and they meant everything.",
"Every smile, every laugh, every little fight…",
"they are still alive somewhere inside me.",
"I don’t regret loving you… not even for a second.",
"Because for a moment, you were my whole world.",
"And even today, when I think about those days…",
"I don’t feel pain… I feel something beautiful.",
"Because not all love stories are meant to stay forever…",
"some are just meant to be remembered. 💔"
];

let i = 0;

function showLine(){
  if(i < lines.length){

    let lineDiv = document.createElement("div");
    lineDiv.className = "line";
    document.getElementById("text").appendChild(lineDiv);

    let words = lines[i].split(" ");
    let w = 0;

    function showWord(){
      if(w < words.length){
        let span = document.createElement("span");
        span.className = "word";
        span.innerText = words[w] + " ";
        lineDiv.appendChild(span);
        w++;
        setTimeout(showWord, 120);
      } else {
        i++;
        setTimeout(showLine, 600);
      }
    }

    showWord();

  } else {
    showFinalTyping();
  }
}

showLine();

/* 💔 FINAL TEXT */
function showFinalTyping(){
  let container = document.getElementById("text");

  let div = document.createElement("div");
  div.className = "typing";
  container.appendChild(div);

  let text = "I still miss you…";
  let j = 0;

  function type(){
    if(j < text.length){
      div.innerHTML += text[j];
      j++;
      setTimeout(type, 90);
    }
  }

  type();
}

/* 👉 NEXT PAGE */
function goNext(){
  window.location.href = "page5.html";
}

</script>

</body>
</html>
