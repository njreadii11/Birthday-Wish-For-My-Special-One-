<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Final 💔</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Playfair Display', serif;
  overflow: hidden;
  color: white;
}

/* 💔 TEXT */
#text {
  font-size: 40px;
  text-align: center;
  letter-spacing: 2px;
}

/* ✨ FADE ANIMATION */
.fade {
  opacity: 0;
  animation: fadeIn 3s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* 💓 HEARTBEAT */
.heart {
  color: #ff4d6d;
  animation: beat 1s infinite;
}

@keyframes beat {
  50% { transform: scale(1.2); }
}
</style>
</head>

<body>

<div id="text"></div>

<script>

const messages = [
  "Maybe we were not meant to stay forever…",
  "But you were the most beautiful part of my life…",
  "And you always will be…",
  "💔"
];

let i = 0;

function showText(){
  if(i < messages.length){
    let div = document.createElement("div");
    div.className = "fade";

    if(messages[i] === "💔"){
      div.innerHTML = '<span class="heart">💔</span>';
    } else {
      div.innerText = messages[i];
    }

    document.getElementById("text").appendChild(div);
    i++;
    setTimeout(showText, 3000);
  } else {
    finalMessage();
  }
}

showText();

function finalMessage(){
  setTimeout(()=>{
    document.body.innerHTML = `
      <div style="
        font-size:50px;
        text-align:center;
        animation: fadeIn 3s forwards;
      ">
        THE END 💔
      </div>
    `;
  },2000);
}

</script>

</body>
</html>
