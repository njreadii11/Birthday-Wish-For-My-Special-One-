<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memories 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Raleway:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Raleway', sans-serif;
  color: white;
}

video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(60%) blur(2px);
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.text {
  max-width: 800px;
  padding: 20px;
}

.line {
  font-size: 24px;
  font-family: 'Playfair Display', serif;
  margin: 14px 0;
}

.word {
  opacity: 0;
  display: inline-block;
  animation: fadeWord 0.5s forwards;
}

@keyframes fadeWord {
  to { opacity: 1; }
}

.typing {
  font-size: 28px;
  margin-top: 30px;
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
}
</style>
</head>

<body>

<video autoplay loop muted playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay">
  <div class="text" id="text"></div>
</div>

<script>

const lines = [
"Some memories are not meant to fade away… 💖",
"They stay quietly in the heart, no matter how far we go.",
"We may not talk anymore, we may not be together…",
"but those moments we shared were real, and they meant everything.",
"Every smile, every laugh, every little fight…",
"they are still alive somewhere inside me.",
"I don’t regret loving you… not even for a second.",
"Because for a moment, you were my whole world.",
"And even today, when I think about those days…",
"I don’t feel pain… I feel something beautiful.",
"Because not all love stories are meant to stay forever…",
"some are just meant to be remembered. 💔"
];

let i = 0;

function showLine(){
  if(i < lines.length){
    let lineDiv = document.createElement("div");
    lineDiv.className = "line";
    document.getElementById("text").appendChild(lineDiv);

    let words = lines[i].split(" ");
    let w = 0;

    function showWord(){
      if(w < words.length){
        let span = document.createElement("span");
        span.className = "word";
        span.innerText = words[w] + " ";
        lineDiv.appendChild(span);
        w++;
        setTimeout(showWord, 150);
      } else {
        i++;
        setTimeout(showLine, 600);
      }
    }

    showWord();
  } else {
    showFinalTyping();
  }
}

function showFinalTyping(){
  let div = document.createElement("div");
  div.className = "typing";
  document.getElementById("text").appendChild(div);

  let text = "I still miss you…";
  let j = 0;

  function type(){
    if(j < text.length){
      div.innerHTML += text[j];
      j++;
      setTimeout(type, 100);
    } else {
      showNextButton();
    }
  }
  type();
}

function showNextButton(){
  let btn = document.createElement("button");
  btn.innerText = "Next ➝";

  btn.style.marginTop = "40px";
  btn.style.padding = "12px 25px";
  btn.style.borderRadius = "30px";
  btn.style.border = "none";
  btn.style.background = "#ff4d6d";
  btn.style.color = "white";
  btn.style.cursor = "pointer";

  btn.onclick = function(){
    window.location.href = "page4.html";
  };

  document.getElementById("text").appendChild(btn);
}

showLine();

</script>

</body>
</html>
